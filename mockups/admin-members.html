<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근력학교 이화 — 수강생</title>
<style>
  /* ── FONT FACES ── */
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Light.ttf') format('truetype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Medium.ttf') format('truetype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-SemiBold.ttf') format('truetype');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Bold.ttf') format('truetype');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TYPE졸업식';
    src: url('fonts/TypeGraduation.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }

  /* ── RESET & VARIABLES ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --purple-700: #3B2650;
    --purple-600: #4B2D5E;
    --purple-500: #5E3D74;
    --purple-400: #7B5A93;
    --purple-300: #9E82B0;
    --purple-200: #C4B0D2;
    --purple-100: #E8DFF0;
    --purple-50:  #F5F0F8;

    --rose-400: #D4829A;
    --rose-300: #E4A5B8;
    --rose-200: #F0C6D4;
    --rose-100: #F9E4EC;
    --rose-50:  #FDF5F8;

    --bg-gradient-1: #EDE0F5;
    --bg-gradient-2: #F9DDE8;
    --bg-gradient-3: #E6DAF2;
    --bg-card: rgba(255, 255, 255, 0.72);
    --bg-card-solid: #fff;
    --bg-input: rgba(245, 240, 248, 0.6);
    --border-subtle: rgba(196, 176, 210, 0.3);

    --text-primary: #2E1A3E;
    --text-secondary: #6B5A7E;
    --text-muted: #A89AB8;
    --text-placeholder: #C4B0D2;

    --success: #3A9A64;
    --success-light: rgba(58, 154, 100, 0.12);
    --warning: #E8A854;
    --warning-light: rgba(232, 168, 84, 0.12);
    --danger: #D94E6A;
    --danger-light: rgba(217, 78, 106, 0.1);

    --font-display: 'TYPE졸업식', sans-serif;
    --font-body: 'CarmenSans', 'Noto Sans KR', sans-serif;

    --nav-height: 68px;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font-body);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-gradient-1);
    color: var(--text-primary);
    padding-bottom: var(--nav-height);
  }

  /* ── GRADIENT BACKGROUND ── */
  .bg-atmosphere {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 10% 5%, rgba(190, 160, 220, 0.6) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 90% 10%, rgba(240, 170, 200, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 75% 85%, rgba(180, 150, 220, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 85%, rgba(235, 180, 205, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
      linear-gradient(150deg, #EDE0F5 0%, #F9DDE8 35%, #E6DAF2 65%, #F5E4EE 100%);
  }

  body::after {
    content: '';
    position: fixed; inset: 0; opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 100;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } }

  /* ── MAIN CONTENT ── */
  .main {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 0 1.25rem 2rem;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 0 1.25rem;
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .header__left { display: flex; align-items: center; gap: 0.75rem; }

  .back-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 2px 10px rgba(75, 45, 94, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.6);
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-600); cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none;
    flex-shrink: 0;
  }
  .back-btn:hover {
    background: rgba(255, 255, 255, 0.6);
    box-shadow: 0 4px 14px rgba(75, 45, 94, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.7);
    transform: translateY(-1px);
  }
  .back-btn svg { width: 20px; height: 20px; }

  .header__title {
    font-family: var(--font-display); font-size: 1.5rem;
    color: var(--text-primary);
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0.625rem; margin-bottom: 1.25rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
  }

  .stat-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1rem; text-align: center;
  }

  .stat-card__value {
    font-family: var(--font-display); font-size: 1.5rem;
    color: var(--text-primary); line-height: 1;
  }
  .stat-card__value span {
    font-family: var(--font-body); font-size: 0.6875rem;
    color: var(--text-muted); font-weight: 400;
  }
  .stat-card__label {
    font-size: 0.6875rem; color: var(--text-muted); font-weight: 500;
    margin-top: 0.375rem;
  }

  /* ── SEARCH CARD ── */
  .search-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 0.875rem 1.125rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
  }

  .search-input {
    width: 100%; border: none; outline: none;
    background: transparent;
    font-family: var(--font-body); font-size: 0.9375rem; font-weight: 500;
    color: var(--text-primary);
    padding: 0.25rem 0;
  }
  .search-input::placeholder {
    color: var(--text-placeholder);
  }

  /* ── FILTER PILLS ── */
  .filter-pills {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    scrollbar-width: none;
  }
  .filter-pills::-webkit-scrollbar { display: none; }

  .filter-pill {
    flex-shrink: 0;
    padding: 0.5rem 1rem; border: none;
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    font-family: var(--font-body); font-size: 0.8125rem; font-weight: 600;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .filter-pill.active {
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 8px rgba(75, 45, 94, 0.25);
  }
  .filter-pill:hover:not(.active) {
    background: rgba(255, 255, 255, 0.85);
    border-color: var(--purple-200);
  }

  /* ── MEMBER LIST ── */
  .member-list {
    display: flex; flex-direction: column; gap: 0.625rem;
  }

  .member-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1rem 1.125rem;
    display: flex; align-items: center; gap: 1rem;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none;
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .member-card:hover {
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 4px 16px rgba(75, 45, 94, 0.12);
    transform: translateY(-2px);
  }

  .member-card__avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 1rem; color: #fff;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.5);
  }

  .member-card__content {
    flex: 1; min-width: 0;
  }

  .member-card__header {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .member-card__name {
    font-family: var(--font-body); font-size: 1rem; font-weight: 700;
    color: var(--text-primary);
  }

  .member-card__level {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0.125rem 0.5rem;
    border-radius: 12px;
    font-size: 0.625rem; font-weight: 700;
    flex-shrink: 0;
  }

  .member-card__level--regular {
    background: rgba(179,157,219,0.25);
    color: #7E57C2;
  }

  .member-card__level--beginner {
    background: rgba(234,179,56,0.2);
    color: #B8860B;
  }

  .member-card__level--newbie {
    background: rgba(158,158,158,0.12);
    color: #888;
  }

  .member-card__level--holding {
    background: rgba(220,53,69,0.06);
    color: #DC3545;
  }

  .member-card__schedule {
    font-size: 0.8125rem; font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
  }

  .member-card__note {
    font-size: 0.75rem; font-weight: 400;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .member-card__note--alert {
    color: #B8860B;
    font-weight: 500;
  }

  .member-card__arrow {
    width: 24px; height: 24px;
    color: var(--purple-300);
    flex-shrink: 0;
  }

  /* ── HOLDING STYLE ── */
  .member-card--holding {
    border-style: dashed;
    border-color: rgba(220, 53, 69, 0.2);
    opacity: 0.7;
  }

  .member-card--holding .member-card__avatar {
    background: linear-gradient(135deg, #DC3545, #B22B3D);
    opacity: 0.6;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .empty-state__icon {
    width: 64px; height: 64px;
    margin: 0 auto 1rem;
    opacity: 0.3;
  }

  .empty-state__text {
    font-size: 0.9375rem; font-weight: 500;
  }

  /* ── BOTTOM NAVIGATION ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-height); z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.25rem; padding: 0.5rem 0.75rem;
    text-decoration: none; color: var(--text-muted);
    transition: color 0.2s; cursor: pointer; position: relative;
  }
  .nav-item.active { color: var(--purple-600); }
  .nav-item.active::before {
    content: ''; position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: linear-gradient(90deg, var(--purple-400), var(--rose-300));
    border-radius: 1px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item__label { font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.02em; }

  .nav-item__badge {
    position: absolute; top: 2px; right: 8px;
    min-width: 16px; height: 16px; border-radius: 8px;
    background: var(--danger); color: #fff;
    font-size: 0.5625rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; border: 1.5px solid #fff;
  }

  /* ── SIDEBAR (Desktop only) ── */
  .sidebar { display: none; }

  .sidebar__logo {
    display: flex; align-items: center; gap: 0.625rem;
    padding: 1.5rem 1.25rem 1.75rem;
  }
  .sidebar__logo-img {
    width: 36px; height: 36px; border-radius: 10px;
    object-fit: cover;
  }
  .sidebar__logo-text {
    font-family: var(--font-display); font-size: 1rem; color: var(--text-primary);
  }

  .sidebar__nav { padding: 0 0.75rem; }

  .sidebar__item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; margin-bottom: 0.25rem;
    border-radius: 10px; text-decoration: none;
    color: var(--text-secondary); font-size: 0.8125rem; font-weight: 500;
    transition: all 0.2s; cursor: pointer; position: relative;
  }
  .sidebar__item:hover {
    background: rgba(94, 61, 116, 0.06); color: var(--purple-600);
  }
  .sidebar__item.active {
    background: rgba(94, 61, 116, 0.1);
    color: var(--purple-600); font-weight: 600;
  }
  .sidebar__item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px;
    background: linear-gradient(180deg, var(--purple-500), var(--rose-400));
    border-radius: 0 2px 2px 0;
  }
  .sidebar__item svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar__item-badge {
    margin-left: auto;
    font-size: 0.625rem; font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 10px;
    background: var(--danger); color: #fff;
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }

  .sidebar__divider {
    height: 1px; background: var(--border-subtle); margin: 0.75rem 1.25rem;
  }

  .sidebar__profile {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem; margin-top: auto;
    border-top: 1px solid var(--border-subtle);
  }
  .sidebar__profile-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 0.75rem; color: #fff; flex-shrink: 0;
  }
  .sidebar__profile-name {
    font-size: 0.8125rem; font-weight: 600; color: var(--text-primary);
  }
  .sidebar__profile-role {
    font-size: 0.625rem; color: var(--text-muted); font-weight: 500;
  }

  /* ── RESPONSIVE ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (min-width: 480px) {
    .main { padding: 0 1.5rem 2rem; }
  }

  /* ── DESKTOP LAYOUT ── */
  @media (min-width: 768px) {
    body { padding-bottom: 0; }
    .bottom-nav { display: none; }
    .mobile-only { display: none !important; }

    .sidebar {
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 240px; z-index: 50;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-subtle);
    }

    .main {
      max-width: none;
      margin-left: 240px;
      padding: 0 2rem 2rem;
    }

    .header { padding: 1.5rem 0; }

    .stats-row {
      grid-template-columns: repeat(3, 1fr);
      gap: 0.875rem;
    }
  }

  @media (min-width: 1200px) {
    .sidebar { width: 260px; }
    .main { margin-left: 260px; padding: 0 2.5rem 2rem; }
    .stat-card { padding: 1.25rem; }
    .stat-card__value { font-size: 1.75rem; }
  }

  /* ── STAGGER ANIMATIONS ── */
  .member-card:nth-child(1) { animation-delay: 0.25s; }
  .member-card:nth-child(2) { animation-delay: 0.28s; }
  .member-card:nth-child(3) { animation-delay: 0.31s; }
  .member-card:nth-child(4) { animation-delay: 0.34s; }
  .member-card:nth-child(5) { animation-delay: 0.37s; }
  .member-card:nth-child(6) { animation-delay: 0.40s; }
  .member-card:nth-child(7) { animation-delay: 0.43s; }
  .member-card:nth-child(8) { animation-delay: 0.46s; }
  .member-card:nth-child(9) { animation-delay: 0.49s; }
  .member-card:nth-child(10) { animation-delay: 0.52s; }
  .member-card:nth-child(11) { animation-delay: 0.55s; }
  .member-card:nth-child(12) { animation-delay: 0.58s; }
</style>
</head>
<body>

<div class="bg-atmosphere"></div>

<!-- Sidebar (Desktop) -->
<aside class="sidebar">
  <div class="sidebar__logo">
    <div class="sidebar__logo-img" style="background: linear-gradient(135deg, var(--purple-600), var(--purple-500)); display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-size: 0.875rem;">근이</div>
    <div class="sidebar__logo-text">근력학교 이화</div>

    <a href="admin-members.html" class="sidebar__item active">

    <a href="#" class="sidebar__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      </svg>
      <span>훈련일지</span>

  },
  {

    category: 'regular',
    note: null,
    alert: false
  },
  {

    name: '봉주희',
    nickname: '주희',
    level: 'regular',

  },
  {

    nickname: '유나',
    level: 'beginner',

    category: 'beginner',
    note: null,
    alert: false
  },
  {
    id: 10,
    name: '정수민',
    nickname: '수미니',
    level: 'regular',
    schedule: '월금 1교시',
    category: 'regular',
    note: '수강권 만료 임박 (2/28)',
    alert: true
  },
  {
    id: 11,
    name: '박서연',
    nickname: '써니',
    level: 'newbie',
    schedule: '월 1교시',
    category: 'newbie',
    note: null,

  },
  {
    id: 12,
    name: '이지원',
    nickname: '지원',
    level: 'holding',
    schedule: '월수 6교시',
    category: 'holding',
    note: '홀딩 2/10~2/20',
    alert: false
  }
];

// State
let currentFilter = 'all';
let searchQuery = '';

// Elements
const searchInput = document.getElementById('searchInput');
const memberList = document.getElementById('memberList');
const emptyState = document.getElementById('emptyState');
const filterPills = document.querySelectorAll('.filter-pill');

// Render functions
function renderMembers(filteredMembers) {
  if (filteredMembers.length === 0) {
    memberList.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  memberList.style.display = 'flex';
  emptyState.style.display = 'none';

  memberList.innerHTML = filteredMembers.map(member => {
    const levelClass = `member-card__level--${member.level}`;
    const levelText = {
      regular: '일반',
      beginner: '삐약이',
      newbie: '입학생',
      holding: '홀딩'
    }[member.level];

    const holdingClass = member.level === 'holding' ? ' member-card--holding' : '';
    const noteClass = member.alert ? ' member-card__note--alert' : '';

    return `
      <a href="member-detail.html?name=${encodeURIComponent(member.name)}" class="member-card${holdingClass}">
        <div class="member-card__avatar">${member.name.charAt(0)}</div>
        <div class="member-card__content">
          <div class="member-card__header">
            <div class="member-card__name">${member.name}(${member.nickname})</div>
            <div class="member-card__level ${levelClass}">${levelText}</div>
          </div>
          <div class="member-card__schedule">${member.schedule}</div>
          ${member.note ? `<div class="member-card__note${noteClass}">${member.note}</div>` : ''}
        </div>
        <svg class="member-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
    `;
  }).join('');
}

function filterMembers() {
  let filtered = members;

  // Apply category filter
  if (currentFilter !== 'all') {
    filtered = filtered.filter(m => m.category === currentFilter);
  }

  // Apply search filter
  if (searchQuery) {
    const query = searchQuery.toLowerCase();
    filtered = filtered.filter(m =>
      m.name.toLowerCase().includes(query) ||
      m.nickname.toLowerCase().includes(query)
    );
  }

  renderMembers(filtered);
}

// Event listeners
searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  filterMembers();
});

filterPills.forEach(pill => {
  pill.addEventListener('click', () => {
    // Update active state
    filterPills.forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    // Update filter
    currentFilter = pill.dataset.filter;
    filterMembers();
  });
});

// Initial render
filterMembers();
</script>
