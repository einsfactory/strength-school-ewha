<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근력학교 이화 — 매출</title>
<style>
  /* ── FONT FACES ── */
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Light.ttf') format('truetype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Medium.ttf') format('truetype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-SemiBold.ttf') format('truetype');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Bold.ttf') format('truetype');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TYPE졸업식';
    src: url('fonts/TypeGraduation.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }

  /* ── RESET & VARIABLES ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --purple-700: #3B2650;
    --purple-600: #4B2D5E;
    --purple-500: #5E3D74;
    --purple-400: #7B5A93;
    --purple-300: #9E82B0;
    --purple-200: #C4B0D2;
    --purple-100: #E8DFF0;
    --purple-50:  #F5F0F8;

    --rose-400: #D4829A;
    --rose-300: #E4A5B8;
    --rose-200: #F0C6D4;
    --rose-100: #F9E4EC;
    --rose-50:  #FDF5F8;

    --bg-gradient-1: #EDE0F5;
    --bg-gradient-2: #F9DDE8;
    --bg-gradient-3: #E6DAF2;
    --bg-card: rgba(255, 255, 255, 0.72);
    --bg-card-solid: #fff;
    --bg-input: rgba(245, 240, 248, 0.6);
    --border-subtle: rgba(196, 176, 210, 0.3);

    --text-primary: #2E1A3E;
    --text-secondary: #6B5A7E;
    --text-muted: #A89AB8;
    --text-placeholder: #C4B0D2;

    --success: #3A9A64;
    --success-light: rgba(58, 154, 100, 0.12);
    --warning: #E8A854;
    --warning-light: rgba(232, 168, 84, 0.12);
    --danger: #D94E6A;
    --danger-light: rgba(217, 78, 106, 0.1);

    --font-display: 'TYPE졸업식', sans-serif;
    --font-body: 'CarmenSans', 'Noto Sans KR', sans-serif;

    --nav-height: 68px;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font-body);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-gradient-1);
    color: var(--text-primary);
    padding-bottom: var(--nav-height);
  }

  /* ── GRADIENT BACKGROUND ── */
  .bg-atmosphere {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 10% 5%, rgba(190, 160, 220, 0.6) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 90% 10%, rgba(240, 170, 200, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 75% 85%, rgba(180, 150, 220, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 85%, rgba(235, 180, 205, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
      linear-gradient(150deg, #EDE0F5 0%, #F9DDE8 35%, #E6DAF2 65%, #F5E4EE 100%);
  }

  body::after {
    content: '';
    position: fixed; inset: 0; opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 100;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } }

  /* ── MAIN CONTENT ── */
  .main {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 0 1.25rem 2rem;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 0 1.5rem;
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 2px 10px rgba(75,45,94,0.08), inset 0 1px 2px rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-600); cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    text-decoration: none; flex-shrink: 0;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.6);
    transform: translateY(-1px);
  }
  .back-btn svg { width: 18px; height: 18px; }
  .page-header__title {
    font-family: var(--font-display); font-size: 1.25rem;
    color: var(--text-primary); flex: 1;
  }
  .page-header__actions { display: flex; gap: 0.5rem; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 2px 10px rgba(75, 45, 94, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.6);
    display: flex; align-items: center; justify-content: center;
    color: var(--purple-600); cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; text-decoration: none;
  }
  .icon-btn:hover {
    background: rgba(255, 255, 255, 0.6);
    transform: translateY(-1px);
  }
  .icon-btn svg { width: 20px; height: 20px; }

  /* ── REVENUE HERO ── */
  .revenue-hero {
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500), var(--rose-400));
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1rem;
    color: #fff;
    position: relative; overflow: hidden;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
  }
  .revenue-hero::before {
    content: ''; position: absolute;
    top: -40%; right: -20%; width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  }
  .revenue-hero__label {
    font-size: 0.625rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7;
    margin-bottom: 0.375rem;
  }
  .revenue-hero__month {
    font-family: var(--font-display); font-size: 1.125rem; margin-bottom: 0.625rem;
  }
  .revenue-hero__amount {
    font-family: var(--font-display); font-size: 1.75rem; line-height: 1;
    margin-bottom: 0.5rem;
  }
  .revenue-hero__bottom {
    display: flex; align-items: center; gap: 1.25rem;
    margin-top: 0.75rem; padding-top: 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .revenue-hero__stat {
    font-size: 0.75rem; opacity: 0.7; font-weight: 400;
  }
  .revenue-hero__stat strong { font-weight: 700; opacity: 1; }

  /* ── SECTION ── */
  .section { margin-bottom: 1.5rem; }
  .section__header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .section__title {
    font-family: var(--font-display); font-size: 1.0625rem;
    color: var(--text-primary);
  }
  .section__sub {
    font-size: 0.6875rem; color: var(--text-muted); font-weight: 500;
  }

  /* ── REVENUE BREAKDOWN ── */
  .rev-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1.125rem 1.25rem;
    margin-bottom: 0.625rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
  }
  .rev-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(196, 176, 210, 0.08);
  }
  .rev-row:last-child { border-bottom: none; }
  .rev-row__left { display: flex; align-items: center; gap: 0.625rem; }
  .rev-row__icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 0.6875rem; font-weight: 700;
    flex-shrink: 0;
  }
  .rev-row__icon--2x { background: rgba(94,61,116,0.08); color: var(--purple-500); }
  .rev-row__icon--3x { background: rgba(75,45,94,0.12); color: var(--purple-600); }
  .rev-row__icon--4x { background: rgba(75,45,94,0.18); color: var(--purple-700); }
  .rev-row__icon--new { background: var(--success-light); color: var(--success); }
  .rev-row__icon--discount { background: var(--warning-light); color: #A67A20; }
  .rev-row__label {
    font-size: 0.8125rem; font-weight: 500; color: var(--text-primary);
  }
  .rev-row__count {
    font-size: 0.6875rem; color: var(--text-muted); font-weight: 400;
    margin-top: 0.0625rem;
  }
  .rev-row__amount {
    font-size: 0.875rem; font-weight: 700; color: var(--text-primary);
    text-align: right;
  }
  .rev-row__amount--discount { color: var(--danger); }
  .rev-total {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 0 0; margin-top: 0.25rem;
    border-top: 2px solid var(--border-subtle);
  }
  .rev-total__label {
    font-size: 0.9375rem; font-weight: 700; color: var(--purple-600);
  }
  .rev-total__amount {
    font-family: var(--font-display); font-size: 1.125rem; color: var(--purple-600);
  }

  /* (price-card, event-card, expiry-card removed) */

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-height);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.25rem; padding: 0.5rem 0.75rem;
    text-decoration: none; color: var(--text-muted);
    transition: color 0.2s; cursor: pointer; position: relative;
  }
  .nav-item.active { color: var(--purple-600); }
  .nav-item.active::before {
    content: ''; position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: linear-gradient(90deg, var(--purple-400), var(--rose-300));
    border-radius: 1px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item__label { font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.02em; }
  .nav-item__badge {
    position: absolute; top: 2px; right: 8px;
    min-width: 16px; height: 16px; border-radius: 8px;
    background: var(--danger); color: #fff;
    font-size: 0.5625rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; border: 1.5px solid #fff;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: none; }
  .sidebar__logo {
    display: flex; align-items: center; gap: 0.625rem;
    padding: 1.5rem 1.25rem 1.75rem;
  }
  .sidebar__logo-img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; }
  .sidebar__logo-text { font-family: var(--font-display); font-size: 1rem; color: var(--text-primary); }
  .sidebar__nav { padding: 0 0.75rem; }
  .sidebar__item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 1rem; margin-bottom: 0.25rem;
    border-radius: 10px; text-decoration: none;
    color: var(--text-secondary); font-size: 0.8125rem; font-weight: 500;
    transition: all 0.2s; cursor: pointer; position: relative;
  }
  .sidebar__item:hover { background: rgba(94, 61, 116, 0.06); color: var(--purple-600); }
  .sidebar__item.active {
    background: rgba(94, 61, 116, 0.1); color: var(--purple-600); font-weight: 600;
  }
  .sidebar__item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 20px;
    background: linear-gradient(180deg, var(--purple-500), var(--rose-400));
    border-radius: 0 2px 2px 0;
  }
  .sidebar__item svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar__item-badge {
    margin-left: auto;
    font-size: 0.625rem; font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 10px;
    background: var(--danger); color: #fff;
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }
  .sidebar__divider { height: 1px; background: var(--border-subtle); margin: 0.75rem 1.25rem; }
  .sidebar__profile {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem; margin-top: auto;
    border-top: 1px solid var(--border-subtle);
  }
  .sidebar__profile-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 0.75rem; color: #fff; flex-shrink: 0;
  }
  .sidebar__profile-name { font-size: 0.8125rem; font-weight: 600; color: var(--text-primary); }
  .sidebar__profile-role { font-size: 0.625rem; color: var(--text-muted); font-weight: 500; }

  /* ── RESPONSIVE ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (min-width: 480px) {
    .main { padding: 0 1.5rem 2rem; }
  }
  @media (min-width: 768px) {
    body { padding-bottom: 0; }
    .bottom-nav { display: none; }
    .sidebar {
      display: flex; flex-direction: column;
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 240px; z-index: 50;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-subtle);
    }
    .main { margin-left: 240px; max-width: 560px; padding: 0 2rem 2rem; }
  }
</style>
</head>

</aside>

<div class="main">
  <!-- Page Header -->
  <header class="page-header">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Revenue Breakdown -->
  <div class="section">
