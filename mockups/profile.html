<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근력학교 이화 — 내 정보</title>
<style>
  /* ── FONT FACES ── */
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Light.ttf') format('truetype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Medium.ttf') format('truetype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-SemiBold.ttf') format('truetype');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Bold.ttf') format('truetype');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TYPE졸업식';
    src: url('fonts/TypeGraduation.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }

  /* ── RESET & VARIABLES ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --purple-700: #3B2650;
    --purple-600: #4B2D5E;
    --purple-500: #5E3D74;
    --purple-400: #7B5A93;
    --purple-300: #9E82B0;
    --purple-200: #C4B0D2;
    --purple-100: #E8DFF0;
    --purple-50:  #F5F0F8;

    --rose-400: #D4829A;
    --rose-300: #E4A5B8;
    --rose-200: #F0C6D4;
    --rose-100: #F9E4EC;
    --rose-50:  #FDF5F8;

    --bg-gradient-1: #EDE0F5;
    --bg-gradient-2: #F9DDE8;
    --bg-gradient-3: #E6DAF2;
    --bg-card: rgba(255, 255, 255, 0.72);
    --border-subtle: rgba(196, 176, 210, 0.3);

    --text-primary: #2E1A3E;
    --text-secondary: #6B5A7E;
    --text-muted: #A89AB8;

    --success: #5BB88A;
    --danger: #D94E6A;

    --font-display: 'TYPE졸업식', sans-serif;
    --font-body: 'CarmenSans', 'Noto Sans KR', sans-serif;

    --nav-height: 68px;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font-body);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-gradient-1);
    color: var(--text-primary);
    padding-bottom: var(--nav-height);
  }

  /* ── GRADIENT BACKGROUND ── */
  .bg-atmosphere {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 10% 5%, rgba(190, 160, 220, 0.6) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 90% 10%, rgba(240, 170, 200, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 75% 85%, rgba(180, 150, 220, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 85%, rgba(235, 180, 205, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
      linear-gradient(150deg, #EDE0F5 0%, #F9DDE8 35%, #E6DAF2 65%, #F5E4EE 100%);
  }

  body::after {
    content: '';
    position: fixed; inset: 0; opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 100;
  }

  .main {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 0 1.25rem 2rem;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 0 1.5rem;
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .back-btn {
    width: 40px; height: 40px; border-radius: 12px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-card); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); cursor: pointer;
    transition: all 0.2s; flex-shrink: 0; text-decoration: none;
  }
  .back-btn:hover { border-color: var(--purple-200); color: var(--purple-500); }
  .back-btn svg { width: 20px; height: 20px; }

  .page-header__title {
    font-family: var(--font-display);
    font-size: 1.25rem; color: var(--text-primary);
  }

  /* ── PROFILE HERO ── */
  .profile-hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 1.5rem 0 1.75rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
  }

  .avatar-wrapper {
    position: relative; margin-bottom: 0.875rem;
  }

  .avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-100), var(--rose-100));
    border: 3px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 20px rgba(75, 45, 94, 0.15);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .avatar__placeholder {
    font-size: 2rem; font-weight: 700;
    color: var(--purple-400);
    font-family: var(--font-display);
  }

  .avatar-edit {
    position: absolute; bottom: 0; right: 0;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--purple-500);
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(75, 45, 94, 0.25);
    transition: transform 0.2s;
  }
  .avatar-edit:active { transform: scale(0.9); }
  .avatar-edit svg { width: 13px; height: 13px; color: #fff; }

  .profile-hero__name {
    font-family: var(--font-display);
    font-size: 1.375rem; color: var(--text-primary);
    margin-bottom: 0.25rem;
  }

  .profile-hero__id {
    font-size: 0.8125rem; color: var(--text-muted); font-weight: 500;
  }

  /* ── INFO CARD ── */
  .info-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    margin-bottom: 0.875rem;
    overflow: hidden;
  }

  .info-card__title {
    font-family: var(--font-display);
    font-size: 0.9375rem; color: var(--text-primary);
    padding: 1rem 1.25rem 0.5rem;
  }

  .info-row {
    display: flex; align-items: center;
    padding: 0.75rem 1.25rem;
    gap: 0.75rem;
    transition: background 0.15s;
  }

  .info-row + .info-row {
    border-top: 1px solid rgba(196, 176, 210, 0.1);
  }

  .info-row__icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: rgba(94, 61, 116, 0.07);
    color: var(--purple-400);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .info-row__icon svg { width: 16px; height: 16px; }

  .info-row__content { flex: 1; min-width: 0; }

  .info-row__label {
    font-size: 0.6875rem; font-weight: 500;
    color: var(--text-muted); margin-bottom: 1px;
  }

  .info-row__value {
    font-size: 1.0625rem; font-weight: 600;
    color: var(--text-primary);
  }

  .info-row__arrow {
    color: var(--text-muted); flex-shrink: 0;
  }
  .info-row__arrow svg { width: 16px; height: 16px; }

  /* ── MENU LIST ── */
  .menu-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    margin-bottom: 0.875rem;
    overflow: hidden;
  }

  .menu-item {
    display: flex; align-items: center;
    padding: 0.875rem 1.25rem;
    gap: 0.75rem; cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none; color: inherit;
  }

  .menu-item:active {
    background: rgba(94, 61, 116, 0.04);
  }

  .menu-item + .menu-item {
    border-top: 1px solid rgba(196, 176, 210, 0.1);
  }

  .menu-item__icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .menu-item__icon svg { width: 16px; height: 16px; }

  .menu-item__icon--purple {
    background: rgba(94, 61, 116, 0.07);
    color: var(--purple-400);
  }

  .menu-item__icon--danger {
    background: rgba(217, 78, 106, 0.08);
    color: var(--danger);
  }

  .menu-item__text {
    flex: 1; font-size: 0.9375rem; font-weight: 400;
    color: var(--text-primary);
  }

  .menu-item__text--danger {
    color: var(--danger);
  }

  .menu-item__chevron {
    color: var(--text-muted); flex-shrink: 0;
  }
  .menu-item__chevron svg { width: 16px; height: 16px; }

  /* ── PASSWORD MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(46, 26, 62, 0.4);
    backdrop-filter: blur(6px);
    align-items: flex-end; justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal {
    width: 100%; max-width: 480px;
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 1.5rem 1.5rem 2rem;
    padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0));
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .modal__handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border-subtle);
    margin: 0 auto 1.25rem;
  }

  .modal__title {
    font-family: var(--font-display);
    font-size: 1.0625rem; color: var(--text-primary);
    margin-bottom: 1rem;
  }

  .modal__input-group {
    margin-bottom: 0.875rem;
  }

  .modal__label {
    font-size: 0.6875rem; font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 0.375rem; display: block;
  }

  .modal__input {
    width: 100%; padding: 0.75rem 1rem;
    border: 1px solid var(--border-subtle);
    border-radius: 10px; font-family: var(--font-body);
    font-size: 0.875rem; color: var(--text-primary);
    background: rgba(245, 240, 248, 0.5);
    transition: border-color 0.2s;
  }

  .modal__input:focus {
    outline: none; border-color: var(--purple-300);
  }

  .modal__btn {
    width: 100%; padding: 0.875rem;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500), var(--rose-400));
    color: #fff; font-family: var(--font-body);
    font-size: 0.875rem; font-weight: 600;
    cursor: pointer; margin-top: 0.5rem;
    transition: all 0.25s;
  }

  .modal__btn:active { transform: scale(0.98); }

  /* ── APP INFO ── */
  .app-info {
    text-align: center;
    padding: 1.5rem 0 0.5rem;
    font-size: 0.6875rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .app-info__logo {
    font-family: var(--font-display);
    font-size: 0.875rem;
    color: var(--purple-300);
    margin-bottom: 0.25rem;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-height);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.25rem; padding: 0.5rem 0.75rem;
    text-decoration: none; color: var(--text-muted);
    transition: color 0.2s; cursor: pointer; position: relative;
  }

  .nav-item.active { color: var(--purple-600); }

  .nav-item.active::before {
    content: ''; position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: linear-gradient(90deg, var(--purple-400), var(--rose-300));
    border-radius: 1px;
  }

  .nav-item svg { width: 22px; height: 22px; }
  .nav-item__label { font-size: 0.5625rem; font-weight: 600; letter-spacing: 0.02em; }

  /* ── RESPONSIVE ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (min-width: 480px) { .main { padding: 0 1.5rem 2rem; } }
  @media (min-width: 768px) { .main { max-width: 560px; padding: 0 2rem 2rem; } }
</style>
</head>

<div class="bg-atmosphere"></div>

<div class="main">

        </svg>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>

  </div>

  <div class="menu-card" style="animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.25s both;">

<script>
(function() {
  var pwModal = document.getElementById('pw-modal');
  var idModal = document.getElementById('id-modal');
  var deleteModal = document.getElementById('delete-modal');
  var pwBtn = document.getElementById('pw-change-btn');
  var pwSubmit = document.getElementById('pw-submit');
  var idChangeBtn = document.getElementById('id-change-btn');
  var idSubmit = document.getElementById('id-submit');
  var excelBtn = document.getElementById('excel-download-btn');
  var logoutBtn = document.getElementById('logout-btn');
  var deleteBtn = document.getElementById('delete-account-btn');
  var deleteSubmit = document.getElementById('delete-submit');
  var avatarBtn = document.getElementById('avatar-edit-btn');

  // Password change modal
  pwBtn.addEventListener('click', function() { pwModal.classList.add('open'); });
  pwModal.addEventListener('click', function(e) { if (e.target === pwModal) pwModal.classList.remove('open'); });
  pwSubmit.addEventListener('click', function() {
    pwSubmit.textContent = '변경 완료!';
    pwSubmit.style.background = 'linear-gradient(135deg, #5BB88A, #4AA87A)';
    setTimeout(function() { pwModal.classList.remove('open'); pwSubmit.textContent = '변경하기'; pwSubmit.style.background = ''; }, 1200);
  });

  // ID change modal
  idChangeBtn.addEventListener('click', function() { idModal.classList.add('open'); });
  idModal.addEventListener('click', function(e) { if (e.target === idModal) idModal.classList.remove('open'); });
  idSubmit.addEventListener('click', function() {
    var newId = document.getElementById('new-id-input').value.trim();
    if (!newId) { document.getElementById('new-id-input').focus(); return; }
    idSubmit.textContent = '변경 완료!';
    idSubmit.style.background = 'linear-gradient(135deg, #5BB88A, #4AA87A)';
    document.querySelector('.profile-hero__id').textContent = newId;
    setTimeout(function() { idModal.classList.remove('open'); idSubmit.textContent = '변경하기'; idSubmit.style.background = ''; }, 1200);
  });

  // Excel download
  excelBtn.addEventListener('click', function() {
    alert('훈련일지 엑셀 다운로드\n(프로토타입 - 실제 다운로드 미연동)');
  });

  // Logout
  logoutBtn.addEventListener('click', function() {
    if (confirm('로그아웃 하시겠습니까?')) { window.location.href = 'login.html'; }
  });

  // Delete account modal
  deleteBtn.addEventListener('click', function() { deleteModal.classList.add('open'); });
  deleteModal.addEventListener('click', function(e) { if (e.target === deleteModal) deleteModal.classList.remove('open'); });
  deleteSubmit.addEventListener('click', function() {
    var confirmText = document.getElementById('delete-confirm-input').value.trim();
    if (confirmText !== '탈퇴합니다') {
      document.getElementById('delete-confirm-input').style.borderColor = 'var(--danger)';
      document.getElementById('delete-confirm-input').focus();
      return;
    }
    deleteSubmit.textContent = '탈퇴 처리중...';
    setTimeout(function() {
      alert('회원탈퇴가 완료되었습니다.');
      window.location.href = 'login.html';
    }, 800);
  });

  // Avatar
  avatarBtn.addEventListener('click', function() {
    alert('프로필 사진 변경\n(프로토타입 - 실제 업로드 미연동)');
  });
})();
</script>
