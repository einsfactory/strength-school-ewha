<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근력학교 이화 — 수업현황</title>
<style>
  /* ── FONT FACES ── */
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Light.ttf') format('truetype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-SemiBold.ttf') format('truetype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'TYPE졸업식';
    src: url('fonts/TypeGraduation.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  /* ── RESET & VARIABLES ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --purple-700: #3B2650;
    --purple-600: #4B2D5E;
    --purple-500: #5E3D74;
    --purple-400: #7B5A93;
    --purple-300: #9E82B0;
    --purple-200: #C4B0D2;
    --purple-100: #E8DFF0;
    --purple-50:  #F5F0F8;

    --rose-400: #D4829A;
    --rose-300: #E4A5B8;
    --rose-200: #F0C6D4;
    --rose-100: #F9E4EC;
    --rose-50:  #FDF5F8;

    --bg-gradient-1: #EDE0F5;
    --bg-gradient-2: #F9DDE8;
    --bg-gradient-3: #E6DAF2;
    --bg-card: rgba(255, 255, 255, 0.72);
    --bg-card-solid: #fff;
    --border-subtle: rgba(196, 176, 210, 0.3);

    --text-primary: #2E1A3E;
    --text-secondary: #6B5A7E;
    --text-muted: #A89AB8;

    --success: #5BB88A;
    --warning: #E8A854;
    --danger: #D94E6A;

    --font-display: 'TYPE졸업식', sans-serif;
    --font-body: 'CarmenSans', 'Noto Sans KR', sans-serif;

    --nav-height: 68px;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font-body);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-gradient-1);
    color: var(--text-primary);
    padding-bottom: var(--nav-height);
  }

  /* ── GRADIENT BACKGROUND ── */
  .bg-atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 10% 5%, rgba(190, 160, 220, 0.6) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 90% 10%, rgba(240, 170, 200, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 75% 85%, rgba(180, 150, 220, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 85%, rgba(235, 180, 205, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
      linear-gradient(150deg, #EDE0F5 0%, #F9DDE8 35%, #E6DAF2 65%, #F5E4EE 100%);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
  }

  /* ── MAIN CONTENT ── */
  .main {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1.25rem 2rem;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 0 1.5rem;
    animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .back-btn:hover {
    border-color: var(--purple-200);
    color: var(--purple-500);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
  }

  .page-header__title {
    font-family: var(--font-display);
    font-size: 1.25rem;
    color: var(--text-primary);
  }

  /* ── MEMBERSHIP CARD ── */
  .membership-card {
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500), var(--rose-400));
    border-radius: 16px;
    padding: 1.75rem 1.25rem;
    color: #fff;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .membership-card::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  }

  .membership-card__dates {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .membership-card__date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .membership-card__date-label {
    font-size: 0.9375rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.65;
  }

  .membership-card__date-value {
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }

  .membership-card__arrow {
    font-size: 1.5rem;
    opacity: 0.5;
    margin-top: 1.1rem;
  }

  .membership-card__badge {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    font-size: 0.6875rem;
    font-weight: 600;
    background: rgba(255,255,255,0.2);
    padding: 0.25rem 0.625rem;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.625rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  .stat-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1rem 0.75rem;
    text-align: center;
  }

  .stat-card__value {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--purple-600);
    line-height: 1;
  }

  .stat-card__value span {
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-muted);
  }

  .stat-card__label {
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 0.375rem;
  }

  /* ── PROGRESS BAR ── */
  .progress-section {
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }

  .progress-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1.125rem 1.25rem;
  }

  .progress-card__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .progress-card__title {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .progress-card__count {
    font-size: 0.8125rem;
    color: var(--purple-500);
    font-weight: 600;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--purple-50);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar__fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-500), var(--rose-400));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  .section__header {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.75rem;
  }

  .section__title {
    font-family: var(--font-display);
    font-size: 1.0625rem;
    color: var(--text-primary);
  }

  .section__more {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .section__more:hover {
    color: var(--purple-500);
  }

  /* ── CALENDAR ── */
  .calendar {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    padding: 1rem;
  }

  .calendar__weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 0.5rem;
  }

  .calendar__weekday {
    text-align: center;
    font-size: 0.625rem;
    font-weight: 600;
    color: var(--text-muted);
    padding: 0.25rem 0;
    letter-spacing: 0.05em;
  }

  .calendar__weekday:first-child {
    color: var(--danger);
  }

  .calendar__days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.25rem 0;
  }

  .calendar__day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    position: relative;
    transition: background 0.2s;
  }

  /* 출석/결석/예정/종료일: 원형 배경 */
  .calendar__day--present,
  .calendar__day--absent,
  .calendar__day--substitute,
  .calendar__day--scheduled,
  .calendar__day--last {
    border-radius: 50%;
  }

  /* 휴일: 배경 없이 대각선 줄무늬 */
  .calendar__day--holiday {
  }

  .calendar__day-num {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .calendar__day--empty .calendar__day-num {
    color: transparent;
  }

  .calendar__day--sunday .calendar__day-num {
    color: var(--danger);
  }

  .calendar__day--other .calendar__day-num {
    color: var(--text-muted);
    opacity: 0.4;
  }

  /* 오늘 날짜 */
  .calendar__day--today .calendar__day-num {
    background: var(--text-primary);
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }

  /* 칸 전체 배경색 */
  .calendar__day--present {
    background: #3A9A64;
  }
  .calendar__day--present .calendar__day-num { color: #fff; font-weight: 600; }

  .calendar__day--absent {
    background: #555;
  }
  .calendar__day--absent .calendar__day-num { color: #fff; font-weight: 600; }
  .calendar__day--absent .calendar__day-tag { color: rgba(255,255,255,0.85); }

  .calendar__day--substitute {
    background: #3A9A64;
  }
  .calendar__day--substitute .calendar__day-num { color: #fff; font-weight: 600; }

  .calendar__day--scheduled {
    background: rgba(158, 130, 176, 0.25);
  }
  .calendar__day--scheduled .calendar__day-num { color: var(--purple-400); }

  .calendar__day--last {
    background: rgba(120, 60, 180, 0.25);
  }
  .calendar__day--last .calendar__day-num { color: #5E3D74; font-weight: 700; }

  .calendar__day-tag {
    font-size: 0.5rem;
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    text-align: center;
  }

  .calendar__day--present .calendar__day-tag { color: rgba(255,255,255,0.9); }
  .calendar__day--substitute .calendar__day-tag { color: rgba(255,255,255,0.9); }
  .calendar__day--scheduled .calendar__day-tag { color: var(--purple-400); }
  .calendar__day--last .calendar__day-tag { color: #5E3D74; }

  .calendar__day--holiday .calendar__day-num {
    color: var(--danger); font-weight: 500;
  }
  .calendar__day--holiday .calendar__day-tag {
    color: var(--danger); font-weight: 400; opacity: 0.7;
  }

  /* 홀딩: 빗금 패턴 + 점선 테두리 */
  .calendar__day--holding {
    border-radius: 6px;
    border: 1.5px dashed rgba(168, 154, 184, 0.5);
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 3px,
        rgba(168, 154, 184, 0.13) 3px,
        rgba(168, 154, 184, 0.13) 5px
      );
  }
  .calendar__day--holding .calendar__day-num { color: var(--text-muted); font-weight: 500; }
  .calendar__day--holding .calendar__day-tag { color: var(--text-muted); font-size: 0.4375rem; }

  /* ── LEGEND ── */
  .calendar__legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 0.5rem;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border-subtle);
  }

  .legend-item {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.625rem;
    border-radius: 6px;
  }

  .legend-item--present {
    background: #3A9A64;
    color: #fff;
  }
  .legend-item--absent {
    background: #555;
    color: #fff;
  }
  .legend-item--scheduled {
    background: rgba(158, 130, 176, 0.25);
    color: var(--purple-400);
  }
  .legend-item--last {
    background: rgba(120, 60, 180, 0.25);
    color: #5E3D74;
  }
  .legend-item--holiday {
    background: transparent;
    color: var(--danger);
    border: 1px dashed rgba(217, 78, 106, 0.3);
  }
  .legend-item--holding {
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 3px,
        rgba(168, 154, 184, 0.13) 3px,
        rgba(168, 154, 184, 0.13) 5px
      );
    color: var(--text-muted);
    border: 1.5px dashed rgba(168, 154, 184, 0.5);
  }

  /* ── MONTH FILTER ── */
  .month-filter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  .month-filter__btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .month-filter__btn:hover {
    border-color: var(--purple-200);
    color: var(--purple-500);
  }

  .month-filter__btn svg {
    width: 16px;
    height: 16px;
  }

  .month-filter__label {
    font-family: var(--font-display);
    font-size: 1.1875rem;
    color: var(--text-primary);
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem 0.75rem;
    text-decoration: none;
    color: var(--text-muted);
    transition: color 0.2s;
    cursor: pointer;
    position: relative;
  }

  .nav-item.active {
    color: var(--purple-600);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 2px;
    background: linear-gradient(90deg, var(--purple-400), var(--rose-300));
    border-radius: 1px;
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
  }

  .nav-item__label {
    font-size: 0.5625rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ── ANIMATIONS ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 480px) {
    .main { padding: 0 1.5rem 2rem; }
  }

  @media (min-width: 768px) {
    .main {
      max-width: 560px;
      padding: 0 2rem 2rem;
    }
    .stats-row { gap: 0.875rem; }
  }
</style>
</head>
<body>

<div class="bg-atmosphere"></div>

<div class="main">
  <!-- Page Header -->
  <header class="page-header">
    <a href="index.html" class="back-btn" aria-label="뒤로가기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <h1 class="page-header__title">수업현황</h1>
  </header>

  <!-- Membership Card -->
  <div class="membership-card">
    <div class="membership-card__dates">
      <div class="membership-card__date-block">
        <span class="membership-card__date-label">시작일</span>
        <span class="membership-card__date-value">25.12.01</span>
      </div>
      <span class="membership-card__arrow">→</span>
      <div class="membership-card__date-block">
        <span class="membership-card__date-label">종료일</span>
        <span class="membership-card__date-value">26.05.31</span>
      </div>
    </div>
    <span class="membership-card__badge">수강중</span>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-card">
      <div class="progress-card__header">
        <span class="progress-card__title">수강 진행률</span>
        <span class="progress-card__count">28 / 40회</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" style="width: 70%"></div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-card__value">28<span>회</span></div>
      <div class="stat-card__label">사용한 수강권</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">12<span>회</span></div>
      <div class="stat-card__label">잔여 횟수</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">87<span>%</span></div>
      <div class="stat-card__label">출석률</div>
    </div>
  </div>

  <!-- Attendance Calendar -->
  <div class="section" style="margin-top: 0.75rem;">
    <div class="month-filter">
      <button class="month-filter__btn" aria-label="이전 달">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="month-filter__label">2026년 2월</span>
