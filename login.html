<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근력학교 이화 — 로그인</title>
<style>
  /* ── FONT FACES ── */
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Light.ttf') format('truetype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-SemiBold.ttf') format('truetype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'CarmenSans';
    src: url('fonts/CarmenSans/CarmenSansOTF-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'TYPE졸업식';
    src: url('fonts/TypeGraduation.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  /* ── RESET & VARIABLES ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --purple-700: #3B2650;
    --purple-600: #4B2D5E;
    --purple-500: #5E3D74;
    --purple-400: #7B5A93;
    --purple-300: #9E82B0;
    --purple-200: #C4B0D2;
    --purple-100: #E8DFF0;
    --purple-50:  #F5F0F8;

    --rose-400: #D4829A;
    --rose-300: #E4A5B8;
    --rose-200: #F0C6D4;
    --rose-100: #F9E4EC;
    --rose-50:  #FDF5F8;

    --bg-gradient-1: #EDE0F5;
    --bg-gradient-2: #F9DDE8;
    --bg-gradient-3: #E6DAF2;
    --bg-card: rgba(255, 255, 255, 0.72);
    --bg-input: rgba(245, 240, 248, 0.6);
    --border-subtle: rgba(196, 176, 210, 0.3);
    --border-focus: var(--purple-400);
    --accent-glow: rgba(75, 45, 94, 0.1);

    --text-primary: #2E1A3E;
    --text-secondary: #6B5A7E;
    --text-muted: #A89AB8;
    --text-placeholder: #C4B0D2;
    --danger: #D94E6A;

    --font-display: 'TYPE졸업식', sans-serif;
    --font-body: 'CarmenSans', 'Noto Sans KR', sans-serif;
  }

  html { font-size: 16px; }

  body {
    font-family: var(--font-body);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-gradient-1);
    color: var(--text-primary);
  }

  /* ── GRADIENT BACKGROUND ── */
  .bg-atmosphere {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 90% 70% at 10% 5%, rgba(190, 160, 220, 0.6) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 90% 10%, rgba(240, 170, 200, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 75% 85%, rgba(180, 150, 220, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 15% 85%, rgba(235, 180, 205, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 70%),
      linear-gradient(150deg, #EDE0F5 0%, #F9DDE8 35%, #E6DAF2 65%, #F5E4EE 100%);
  }

  /* Soft noise */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 100;
  }

  /* Flowing curves */
  .bg-curve {
    position: fixed;
    z-index: 0;
    opacity: 0.06;
  }

  .bg-curve--1 {
    top: 5%;
    right: -8%;
    width: 350px;
    height: 700px;
  }

  .bg-curve--2 {
    bottom: 0;
    left: -8%;
    width: 300px;
    height: 550px;
    transform: scaleX(-1);
  }

  .bg-curve svg {
    width: 100%;
    height: 100%;
  }

  /* ── MAIN LAYOUT ── */
  .login-page {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
    min-height: 100dvh;
  }

  /* ── BRAND ── */
  .brand {
    text-align: center;
    margin-bottom: 2rem;
    animation: enterBrand 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes enterBrand {
    from {
      opacity: 0;
      transform: translateY(-20px) scale(0.97);
    }
  }

  .brand__logo {
    width: 120px;
    height: auto;
    margin: 0 auto 0.625rem;
    display: block;
    animation: logoFloat 5s ease-in-out infinite alternate;
    filter: drop-shadow(0 4px 12px rgba(75, 45, 94, 0.1));
  }

  @keyframes logoFloat {
    0% { transform: translateY(0); }
    100% { transform: translateY(-5px); }
  }

  .brand__name {
    font-family: var(--font-display);
    font-size: clamp(2rem, 7vw, 2.75rem);
    line-height: 1.15;
    color: var(--purple-600);
    letter-spacing: 0.04em;
  }

  .brand__name em {
    font-style: normal;
    color: var(--purple-400);
  }

  .brand__sub {
    font-family: var(--font-body);
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.4em;
    color: var(--text-muted);
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  .brand__tagline {
    display: none;
  }

  /* ── LOGIN CARD ── */
  .login-card {
    width: 100%;
    max-width: 400px;
    animation: enterCard 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes enterCard {
    from {
      opacity: 0;
      transform: translateY(28px);
    }
  }

  .login-card__inner {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 2rem 1.5rem 2rem;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 4px 24px rgba(75, 45, 94, 0.06),
      0 1px 3px rgba(75, 45, 94, 0.04);
  }

  /* Top gradient accent */
  .login-card__inner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--purple-200), var(--purple-400), var(--rose-300), var(--purple-200));
    opacity: 0.8;
  }

  .card-label {
    font-family: var(--font-body);
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-transform: uppercase;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-subtle), transparent);
  }

  /* ── FORM ── */
  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    letter-spacing: 0.01em;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap__icon {
    position: absolute;
    left: 0.875rem;
    top: 50%;
    transform: translateY(-50%);
    width: 17px;
    height: 17px;
    color: var(--text-muted);
    transition: color 0.35s ease;
    pointer-events: none;
  }

  .form-input {
    width: 100%;
    padding: 0.8125rem 1rem 0.8125rem 2.625rem;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.9375rem;
    font-weight: 400;
    outline: none;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    caret-color: var(--purple-400);
  }

  .form-input::placeholder {
    color: var(--text-placeholder);
    font-weight: 300;
  }

  .form-input:focus {
    border-color: var(--purple-300);
    background: rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 0 3px rgba(158, 130, 176, 0.15), 0 2px 12px rgba(75, 45, 94, 0.06);
  }

  .form-input:focus ~ .input-wrap__icon,
  .form-input:not(:placeholder-shown) ~ .input-wrap__icon {
    color: var(--purple-400);
  }

  /* Password toggle */
  .pw-toggle {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.25rem;
    display: flex;
    transition: color 0.2s;
    border-radius: 6px;
  }
  .pw-toggle:hover { color: var(--purple-400); }
  .pw-toggle svg { width: 17px; height: 17px; }

  /* ── ERROR ── */
  .form-error {
    font-size: 0.75rem;
    color: var(--danger);
    margin-top: 0.375rem;
    display: none;
    align-items: center;
    gap: 0.375rem;
    font-weight: 400;
  }

  .form-error.visible {
    display: flex;
    animation: shakeError 0.4s ease;
  }

  @keyframes shakeError {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  /* ── LOGIN BUTTON ── */
  .btn-login {
    width: 100%;
    padding: 0.875rem;
    margin-top: 0.75rem;
    background: linear-gradient(135deg, var(--purple-600), var(--purple-500), var(--rose-400));
    background-size: 200% 200%;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 1.0625rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 2px 12px rgba(75, 45, 94, 0.2);
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .btn-login:hover::before {
    transform: translateX(100%);
  }

  .btn-login:hover {
    background-position: 100% 50%;
    box-shadow: 0 4px 20px rgba(75, 45, 94, 0.3), 0 2px 8px rgba(212, 130, 154, 0.2);
    transform: translateY(-1px);
  }

  .btn-login:active {
    transform: translateY(0);
    box-shadow: 0 1px 6px rgba(75, 45, 94, 0.15);
  }

  .btn-login__text {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .btn-login__arrow {
    transition: transform 0.3s ease;
  }

  .btn-login:hover .btn-login__arrow {
    transform: translateX(4px);
  }

  /* Loading */
  .btn-login.loading { pointer-events: none; }
  .btn-login.loading .btn-login__text { opacity: 0; }
  .btn-login.loading .btn-login__spinner { opacity: 1; }

  .btn-login__spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.375rem 0 1.25rem;
    font-size: 0.625rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }

  /* ── HELP LINK ── */
  .help-section {
    text-align: center;
  }

  .help-link {
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.25s;
    position: relative;
  }

  .help-link:hover {
    color: var(--purple-500);
  }

  .help-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--purple-300), var(--rose-300));
    transform: scaleX(0);
    transition: transform 0.3s ease;
    transform-origin: center;
  }

  .help-link:hover::after {
    transform: scaleX(1);
  }

  /* ── FOOTER ── */
  .login-footer {
    margin-top: 2.5rem;
    text-align: center;
    animation: enterCard 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }

  .login-footer__text {
    font-family: var(--font-body);
    font-size: 0.5625rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .login-footer__bar {
    width: 20px;
    height: 2px;
    background: linear-gradient(90deg, var(--purple-300), var(--rose-300));
    margin: 0.5rem auto 0;
    opacity: 0.5;
    border-radius: 1px;
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 480px) {
    .login-card__inner {
      padding: 2.25rem 2rem 2.5rem;
    }

    .brand__logo {
      width: 130px;
    }
  }

  @media (min-width: 768px) {
    .login-page {
      padding: 3rem 2rem;
    }

    .brand {
      margin-bottom: 2.5rem;
    }

    .brand__logo {
      width: 140px;
    }
  }

  @media (min-width: 1024px) {
    .login-page {
      flex-direction: row;
      gap: 6rem;
      padding: 4rem;
    }

    .brand {
      text-align: left;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .brand__logo {
      width: 150px;
      margin: 0 0 0.75rem 0;
    }

    .brand__name {
      font-size: 3.25rem;
    }

    .brand__sub {
      margin-top: 0.75rem;
      font-size: 0.6875rem;
    }

    .brand__tagline {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.9375rem;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.8;
      max-width: 280px;
    }

    .login-card {
      max-width: 420px;
    }

    .login-footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      margin: 0;
    }

    .bg-curve--1 { opacity: 0.08; }
    .bg-curve--2 { opacity: 0.05; }
  }

  /* ── ACCESSIBILITY ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .form-input:focus-visible,
  .btn-login:focus-visible,
  .pw-toggle:focus-visible,
  .help-link:focus-visible {
    outline: 2px solid var(--purple-300);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-atmosphere"></div>

<div class="bg-curve bg-curve--1">
  <svg viewBox="0 0 300 700" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M150 0C150 0 300 120 200 240C100 360 300 480 200 600C150 660 150 700 150 700" stroke="url(#gc1)" stroke-width="1.5" fill="none"/>
    <path d="M180 0C180 0 320 140 220 260C120 380 320 500 220 620C170 680 170 700 170 700" stroke="url(#gc1)" stroke-width="0.75" fill="none"/>
    <defs>
      <linearGradient id="gc1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#C4B0D2"/>
        <stop offset="100%" stop-color="#E4A5B8"/>
      </linearGradient>
    </defs>
  </svg>
</div>
<div class="bg-curve bg-curve--2">
  <svg viewBox="0 0 300 550" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M150 0C150 0 300 100 200 200C100 300 300 400 200 500C170 530 150 550 150 550" stroke="url(#gc2)" stroke-width="1" fill="none"/>
    <defs>
      <linearGradient id="gc2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E4A5B8"/>
        <stop offset="100%" stop-color="#C4B0D2"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<main class="login-page">
  <!-- Brand -->
  <header class="brand">
    <img src="logo_no_text.png" alt="근력학교 로고" class="brand__logo">
    <h1 class="brand__name">근력학교 <em>이화</em></h1>
    <p class="brand__sub">Strength School Ewha</p>
    <p class="brand__tagline">여성 전용 그룹PT 관리 시스템.<br>오늘도 강해지는 하루를 시작하세요.</p>
  </header>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-card__inner">
      <div class="card-label">Member Login</div>

      <form id="loginForm" novalidate>
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">아이디</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              class="form-input"
              placeholder="예) 홍길동1234"
              autocomplete="username"
              required
            >
            <svg class="input-wrap__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="form-error" id="usernameError">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            아이디를 입력해주세요
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
              required
            >
            <svg class="input-wrap__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="비밀번호 보기">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="eye-open">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="eye-closed" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <div class="form-error" id="passwordError">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            비밀번호를 입력해주세요
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-login__text">
            로그인
            <svg class="btn-login__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
          <div class="btn-login__spinner">
            <div class="spinner"></div>
          </div>
        </button>
      </form>

      <div class="divider">Help</div>

      <div class="help-section">
        <a href="#" class="help-link" id="helpLink">로그인에 문제가 있으신가요?</a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="login-footer">
    <p class="login-footer__text">&copy; 2026 Strength School Ewha</p>
    <div class="login-footer__bar"></div>
  </footer>
</main>

<script>
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const usernameError = document.getElementById('usernameError');
  const passwordError = document.getElementById('passwordError');
  const btnLogin = document.getElementById('btnLogin');
  const pwToggle = document.getElementById('pwToggle');
  const helpLink = document.getElementById('helpLink');

  pwToggle.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    pwToggle.querySelector('.eye-open').style.display = isPassword ? 'none' : 'block';
    pwToggle.querySelector('.eye-closed').style.display = isPassword ? 'block' : 'none';
    pwToggle.setAttribute('aria-label', isPassword ? '비밀번호 숨기기' : '비밀번호 보기');
  });

  usernameInput.addEventListener('input', () => {
    usernameError.classList.remove('visible');
    usernameInput.style.borderColor = '';
  });

  passwordInput.addEventListener('input', () => {
    passwordError.classList.remove('visible');
    passwordInput.style.borderColor = '';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;
    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username) {
      usernameError.classList.add('visible');
      usernameInput.style.borderColor = 'var(--danger)';
      valid = false;
    }
    if (!password) {
      passwordError.classList.add('visible');
      passwordInput.style.borderColor = 'var(--danger)';
      valid = false;
    }
    if (!valid) return;

    btnLogin.classList.add('loading');
    btnLogin.disabled = true;
    await new Promise(r => setTimeout(r, 1800));
    btnLogin.classList.remove('loading');
    btnLogin.disabled = false;
    window.location.href = 'index.html';
  });

  helpLink.addEventListener('click', (e) => {
    e.preventDefault();
    alert('트레이너에게 문의해주세요.\n초기 아이디: 이름 + 전화번호 뒷 4자리\n초기 비밀번호: 전화번호 전체');
  });

  usernameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); passwordInput.focus(); }
  });
</script>

</body>
</html>
